<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SalIA — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #06090F; --surface: #0C1018; --surface2: #111820;
  --border: rgba(255,255,255,0.06); --accent: #00D4FF; --accent2: #7B61FF;
  --green: #10B981; --red: #EF4444;
  --text: #E8EDF2; --muted: #5A6B7D; --muted2: #8A9BAD;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 40px 20px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.018) 1px, transparent 1px);
  background-size: 52px 52px; pointer-events: none; z-index: 0;
}
.container { width: 100%; max-width: 420px; position: relative; z-index: 1; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px; color: var(--text); margin-bottom: 6px; }
.logo span { color: var(--accent); }
.subtitle { font-size: 13px; color: var(--muted2); margin-bottom: 36px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px; margin-bottom: 14px;
}
.tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface2); border-radius: 10px; padding: 4px; }
.tab {
  flex: 1; padding: 9px; border: none; border-radius: 8px; cursor: pointer;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
  background: transparent; color: var(--muted2); transition: all 0.2s;
}
.tab.active { background: var(--accent); color: #06090F; }
.field { margin-bottom: 16px; }
label { display: block; font-size: 12px; color: var(--muted2); margin-bottom: 7px; font-weight: 500; }
input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 16px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: rgba(0,212,255,0.35); }
.btn {
  width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #06090F; transition: opacity 0.2s; margin-top: 4px;
}
.btn:hover:not(:disabled) { opacity: 0.88; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.status {
  border-radius: 10px; padding: 12px 16px; font-size: 13px;
  margin-top: 14px; display: none; line-height: 1.5;
}
.status.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #F87171; }
.status.success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: var(--green); }
.info { font-size: 12px; color: var(--muted); margin-top: 16px; text-align: center; line-height: 1.6; }
.info strong { color: var(--muted2); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Sal<span>i</span>A</div>
  <div class="subtitle">Accède à ton outil d'analyse d'appels de vente.</div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Connexion</button>
      <button class="tab" onclick="switchTab('register')">Créer un compte</button>
    </div>

    <div id="form-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="ton@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn" id="login-btn" onclick="doLogin()">Se connecter</button>
    </div>

    <div id="form-register" style="display:none">
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="ton@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="reg-password" placeholder="Choisis un mot de passe" autocomplete="new-password"/>
      </div>
      <button class="btn" id="reg-btn" onclick="doRegister()">Créer mon compte</button>
      <div class="info">Chaque compte donne droit à <strong>3 analyses</strong> à vie.</div>
    </div>

    <div class="status" id="status"></div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  hideStatus();
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
  el.style.display = 'block';
}

function hideStatus() {
  document.getElementById('status').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  if (!email || !password) return showStatus('error', 'Remplis tous les champs.');
  btn.disabled = true;
  btn.textContent = 'Connexion…';
  try {
    const r = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', email, password }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Erreur.');
    localStorage.setItem('salia_token', data.token);
    localStorage.setItem('salia_uses', data.uses);
    window.location.href = '/';
  } catch (e) {
    showStatus('error', e.message);
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}

async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const btn = document.getElementById('reg-btn');
  if (!email || !password) return showStatus('error', 'Remplis tous les champs.');
  if (password.length < 6) return showStatus('error', 'Le mot de passe doit faire au moins 6 caractères.');
  btn.disabled = true;
  btn.textContent = 'Création…';
  try {
    const r = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'register', email, password }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Erreur.');
    localStorage.setItem('salia_token', data.token);
    localStorage.setItem('salia_uses', data.uses);
    window.location.href = '/';
  } catch (e) {
    showStatus('error', e.message);
    btn.disabled = false;
    btn.textContent = 'Créer mon compte';
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const loginVisible = document.getElementById('form-login').style.display !== 'none';
    loginVisible ? doLogin() : doRegister();
  }
});
</script>
</body>
</html>
