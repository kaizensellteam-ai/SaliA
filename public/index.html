<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SalIA — Analyse d'appel de vente</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #06090F; --surface: #0C1018; --surface2: #111820;
  --border: rgba(255,255,255,0.06); --accent: #00D4FF; --accent2: #7B61FF;
  --green: #10B981; --yellow: #F59E0B; --red: #EF4444;
  --text: #E8EDF2; --muted: #5A6B7D; --muted2: #8A9BAD;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 40px 20px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.018) 1px, transparent 1px);
  background-size: 52px 52px; pointer-events: none; z-index: 0;
}
.container { width: 100%; max-width: 720px; position: relative; z-index: 1; }

.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px; color: var(--text); margin-bottom: 6px; }
.logo span { color: var(--accent); }
.subtitle { font-size: 13px; color: var(--muted2); margin-bottom: 36px; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px; margin-bottom: 14px;
}
.card-title {
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
  color: var(--muted2); text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.card-title::before { content: ''; width: 3px; height: 13px; background: var(--accent); border-radius: 2px; display: block; }

textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6;
  resize: vertical; outline: none; transition: border-color 0.2s;
  min-height: 260px;
}
textarea:focus { border-color: rgba(0,212,255,0.35); }
textarea::placeholder { color: var(--muted); }

.hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

.btn {
  width: 100%; padding: 17px; border-radius: 12px; border: none; cursor: pointer;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.3px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #06090F; transition: opacity 0.2s, transform 0.1s; margin-top: 4px;
}
.btn:hover:not(:disabled) { opacity: 0.88; }
.btn:active:not(:disabled) { transform: scale(0.99); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

.status {
  border-radius: 10px; padding: 13px 16px; font-size: 13px;
  margin-top: 14px; display: none; font-family: 'JetBrains Mono', monospace;
  line-height: 1.5;
}
.status.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #F87171; }
.status.loading { background: rgba(0,212,255,0.06); border: 1px solid rgba(0,212,255,0.18); color: var(--accent); }
.status.success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: var(--green); }

.spinner {
  display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(0,212,255,0.3);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.footer { margin-top: 28px; text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Sal<span>i</span>A</div>
  <div class="subtitle">Colle la transcription de ton appel — reçois ton feedback en un clic.</div>

  <div class="card">
    <div class="card-title">Transcription de l'appel</div>
    <textarea id="transcript" placeholder="Colle ici la transcription complète de ton appel de vente...&#10;&#10;Exemple :&#10;[00:00] Vendeur : Bonjour, comment tu vas ?&#10;[00:05] Prospect : Bien merci, et toi ?&#10;..."></textarea>
    <div class="hint">La transcription peut être brute (horodatages, noms des intervenants, etc.) — SalIA s'adapte.</div>
  </div>

  <button class="btn" id="btn" onclick="generate()">⚡ Générer mon feedback</button>

  <div class="status" id="status"></div>

  <div class="footer">Propulsé par Claude · Analyse basée sur La Bible de la Vente</div>
</div>

<script>
const TEMPLATE_URL = '/template.html';

async function generate() {
  const transcript = document.getElementById('transcript').value.trim();
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');

  if (!transcript) {
    showStatus('error', 'La transcription est vide. Colle le texte de ton appel avant de générer.');
    return;
  }

  if (transcript.length < 200) {
    showStatus('error', 'La transcription semble trop courte. Assure-toi de coller l\'appel complet.');
    return;
  }

  btn.disabled = true;
  showStatus('loading', '<span class="spinner"></span>SalIA analyse ton appel… (60–90 secondes selon la durée de l\'appel)');

  try {
    const templateRes = await fetch(TEMPLATE_URL);
    if (!templateRes.ok) throw new Error('Template introuvable.');
    const template = await templateRes.text();

    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ transcript, template }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Erreur serveur.' }));
      throw new Error(err.error || 'Erreur serveur.');
    }

    const html = await res.text();

    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `salia-feedback-${new Date().toISOString().slice(0,10)}.html`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);

    showStatus('success', '✅ Feedback généré et téléchargé ! Ouvre le fichier .html dans ton navigateur.');
  } catch (err) {
    showStatus('error', '❌ ' + err.message);
  } finally {
    btn.disabled = false;
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
